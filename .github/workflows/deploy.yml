name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

  # 允许在 GitHub Actions 页面手动触发
  workflow_dispatch:

# 给 Actions 设置 GitHub Pages 所需的权限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一时间只允许一次部署，不取消进行中的部署，让它完成
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: 构建
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: 安装依赖
        run: pnpm install --frozen-lockfile

      - name: 构建项目
        run: pnpm build
        env:
          # 设置 GitHub Pages 子路径，格式：/仓库名/
          VITE_APP_BASE: /${{ github.event.repository.name }}/

      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v5

      - name: 打包构建产物
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    name: 部署
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
