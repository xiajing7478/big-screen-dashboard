name: ✨ 功能需求
description: 提议一个新功能或改进
title: '[Feat] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        感谢你提交功能需求！请尽量描述清楚你的诉求。

  - type: textarea
    id: problem
    attributes:
      label: 背景 / 问题
      description: 这个功能要解决什么问题？目前有什么困境？
      placeholder: 我总是需要手动执行 XX，每次都很繁琐...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 你希望如何解决这个问题？
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 你考虑过哪些其他方法？

  - type: textarea
    id: extra
    attributes:
      label: 补充信息 / 截图
      description: 其他参考资料，设计稿，截图等
